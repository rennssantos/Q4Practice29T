<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>
</head>
<body>
    <h1>Switch Statement</h1>
    
    <button class="btn btn-info" onclick="teamRank()">Rank</button>
    <script>

        function teamRank(){
            var rank = "1st";

            message = "";
            
            switch(true){
                case (rank === "1st"):
                    message = "Champion!";
                    break;
                case (rank === "2nd"):
                    message= "2nd Placer!";
                    break;
                case (rank === "3rd"):
                    message ="3rd Placer!";
                    break;
                case (rank === "4th"):
                    message = "4th Placer!";
                    break;
                default:
                    message = "Rank could not be determined.";
                
            }
                alert(message);
        }

        let team = "Red"; //string

        switch(team){
            case "Red" :
                alert("Go Red Bulldogs!");
                break;
            case "Blue" :
                alert("Go Blue Bears! For the win!");
                break;
            case "Green":
                alert("Go Green Hornets! Laban!");
                break;
            case "Yellow":
                alert("Go Yellow Tigers! Malakas!");
                break;
            default:
                alert("Team could not be determined.");
        }
    </script>
</body>
</html>
